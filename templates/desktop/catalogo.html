<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - Biblioteca DuocUC</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }
        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .stock-badge.available { background: rgba(76,175,80,0.15); color: #4CAF50; }
        .stock-badge.low { background: rgba(255,193,7,0.15); color: #FFC107; }
        .stock-badge.none { background: rgba(204,0,0,0.15); color: var(--brand-red); }
        .table-actions {
            display: flex;
            gap: 8px;
        }
        #mensaje-exito {
            display: none;
        }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-bar input {
            width: 300px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='/'">
            <span>Biblioteca</span><span>DuocUC</span>
        </div>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/catalogo" class="active">Inventario</a></li>
                <li><a href="/prestamos">Préstamos</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Administración de Materiales</h2>

        <!-- Mensajes -->
        <div id="mensaje-exito" class="alert alert-success"></div>
        <div id="mensaje-error" class="alert alert-error" style="display:none;"></div>

        <!-- Formulario -->
        <div class="form-card">
            <h3 id="form-title">Registrar Nuevo Material</h3>
            <form id="form-material">
                <input type="hidden" id="mat-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Título del Material</label>
                        <input type="text" id="mat-titulo" placeholder="Ej: Física Universitaria" required>
                    </div>
                    <div class="form-group">
                        <label>Autor</label>
                        <input type="text" id="mat-autor" placeholder="Ej: Serway" required>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="mat-tipo">
                            <option value="1">Libro</option>
                            <option value="2">Revista</option>
                            <option value="3">Tesis</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Stock (Copias Físicas)</label>
                        <input type="number" id="mat-stock" min="1" value="1" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" onclick="limpiarForm()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Material</button>
                </div>
            </form>
        </div>

        <!-- Filtro -->
        <div class="filter-bar">
            <input type="text" id="filtro-titulo" placeholder="Filtrar por título o autor..." oninput="cargarMateriales()">
            <span style="color:var(--text-muted);" id="total-materiales">0 materiales</span>
        </div>

        <!-- Tabla -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Tipo</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                <tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let materialesOriginales = [];

        // CARGAR MATERIALES
        async function cargarMateriales() {
            const tbody = document.getElementById('tabla-body');
            const filtro = document.getElementById('filtro-titulo').value.toLowerCase().trim();
            
            try {
                const response = await fetch('/api/material');
                const data = await response.json();
                
                if (data.success) {
                    materialesOriginales = data.materiales;
                    
                    // Filtrar
                    let filtrados = data.materiales;
                    if (filtro) {
                        filtrados = data.materiales.filter(m => 
                            m.titulo.toLowerCase().includes(filtro) || 
                            m.autor.toLowerCase().includes(filtro)
                        );
                    }

                    document.getElementById('total-materiales').innerText = `${filtrados.length} material(es)`;

                    if (filtrados.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">No se encontraron materiales</td></tr>';
                        return;
                    }

                    tbody.innerHTML = '';
                    filtrados.forEach(m => {
                        let stockClass = 'available';
                        let stockText = `${m.stock_disponible}/${m.stock_total} Disp.`;
                        
                        if (m.stock_disponible === 0) {
                            stockClass = 'none';
                            stockText = 'Sin stock';
                        } else if (m.stock_disponible < m.stock_total) {
                            stockClass = 'low';
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td style="color:var(--text-muted)">#${m.idmaterial}</td>
                                <td style="color:white; font-weight:bold;">${m.titulo}</td>
                                <td>${m.autor}</td>
                                <td style="color:var(--text-muted)">${m.tipo || 'N/A'}</td>
                                <td><span class="stock-badge ${stockClass}">${stockText}</span></td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn btn-sm btn-primary" onclick="prepararEdicion(${m.idmaterial})">Editar</button>
                                        <button class="btn btn-sm btn-danger" onclick="eliminarMaterial(${m.idmaterial})">Eliminar</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--brand-red);">Error al cargar materiales</td></tr>';
            }
        }

        // FORMULARIO
        function limpiarForm() {
            document.getElementById('form-material').reset();
            document.getElementById('mat-id').value = '';
            document.getElementById('form-title').innerText = 'Registrar Nuevo Material';
            document.getElementById('mat-stock').disabled = false;
            ocultarMensajes();
        }

        function prepararEdicion(id) {
            const m = materialesOriginales.find(x => x.idmaterial === id);
            if (!m) return;

            document.getElementById('mat-id').value = m.idmaterial;
            document.getElementById('mat-titulo').value = m.titulo;
            document.getElementById('mat-autor').value = m.autor;
            document.getElementById('mat-tipo').value = m.idtipo || 1;
            document.getElementById('mat-stock').value = 0;
            document.getElementById('mat-stock').disabled = true;
            document.getElementById('form-title').innerText = `Editando: ${m.titulo}`;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function eliminarMaterial(id) {
            const m = materialesOriginales.find(x => x.idmaterial === id);
            if (!confirm(`¿Eliminar "${m?.titulo}" del sistema?\n\nSolo se puede eliminar si no tiene copias prestadas o reservadas.`)) return;

            try {
                const response = await fetch(`/api/material/${id}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.success) {
                    mostrarExito(data.message);
                    cargarMateriales();
                } else {
                    mostrarError(data.message);
                }
            } catch (e) {
                mostrarError("Error de conexión");
            }
        }

        document.getElementById('form-material').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('mat-id').value;
            const payload = {
                titulo: document.getElementById('mat-titulo').value.trim(),
                autor: document.getElementById('mat-autor').value.trim(),
                idtipo: parseInt(document.getElementById('mat-tipo').value),
                stock: parseInt(document.getElementById('mat-stock').value)
            };

            if (!payload.titulo || !payload.autor) {
                mostrarError("Título y autor son obligatorios");
                return;
            }

            try {
                let response;
                
                if (id) {
                    // EDITAR
                    response = await fetch(`/api/material/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // CREAR
                    response = await fetch('/api/material', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                const data = await response.json();
                
                if (data.success) {
                    mostrarExito(data.message);
                    limpiarForm();
                    cargarMateriales();
                } else {
                    mostrarError(data.message);
                }
            } catch (e) {
                mostrarError("Error de conexión");
            }
        });

        // MENSAJES 
        function mostrarExito(mensaje) {
            document.getElementById('mensaje-exito').innerText = mensaje;
            document.getElementById('mensaje-exito').style.display = 'block';
            document.getElementById('mensaje-error').style.display = 'none';
            setTimeout(() => ocultarMensajes(), 4000);
        }

        function mostrarError(mensaje) {
            document.getElementById('mensaje-error').innerText = mensaje;
            document.getElementById('mensaje-error').style.display = 'block';
            document.getElementById('mensaje-exito').style.display = 'none';
        }

        function ocultarMensajes() {
            document.getElementById('mensaje-exito').style.display = 'none';
            document.getElementById('mensaje-error').style.display = 'none';
        }

        // Cargar al inicio
        cargarMateriales();
    </script>
</body>
</html>
