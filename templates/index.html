<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Biblioteca DuocUC</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            <span>Biblioteca</span><span>DuocUC</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="catalogo.html">Inventario</a></li>
                <li><a href="reservas.html">Reservar</a></li>
                <li><a href="mis_prestamos.html">Mis Préstamos</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Bienvenido al Portal</h2>
        <div class="dashboard-grid">
            
            <!-- Tendencias (Antes Top 5) -->
            <div class="card">
                <h3>Tendencias de Lectura</h3>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:15px;">Materiales más solicitados esta semana.</p>
                <ul id="top-list"></ul>
            </div>

            <!-- Resumen Usuario -->
            <div class="card">
                <h3>Mi Actividad</h3>
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:15px;">Estado actual de tu cuenta.</p>
                <ul>
                    <li>Reservas Activas <span id="resumen-reservas">0 / 3</span></li>
                    <li>Material Retirado <span id="resumen-prestamos">0</span></li>
                </ul>
            </div>

        </div>
    </div>

    <script src="mock-db.js"></script>
    <script>
        // Cargar Tendencias
        const tops = obtenerTopMateriales();
        const listaTop = document.getElementById('top-list');
        
        tops.forEach((m, index) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${m.titulo}</span> <span>${m.veces_prestado} veces</span>`;
            listaTop.appendChild(li);
        });

        // Resumen Dinámico
        const activas = reservas.filter(r => r.idusuario === usuarioActual.id && r.estado === 'Activa');
        document.getElementById('resumen-reservas').innerText = activas.length;
        
        const prestamosActivos = prestamos.filter(p => p.idusuario === usuarioActual.id && p.estado === 'Pendiente');
        document.getElementById('resumen-prestamos').innerText = prestamosActivos.length;
    </script>
</body>
</html>
