<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva de Espacios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            <span>Biblioteca</span><span>DuocUC</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Inventario</a></li>
                <li><a href="reservas.html" class="active">Reservar</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <h2>Reserva de Materiales</h2>
        <p style="color:var(--text-muted); margin-bottom:20px;">Selecciona un material para apartarlo por 48 horas.</p>
        
        <div id="msg-box"></div>

        <table>
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Autor</th>
                    <th>Estado en Sede</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-reservas"></tbody>
        </table>
    </div>

    <script src="mock-db.js"></script>
    <script>
        function renderizarMateriales() {
            const tbody = document.getElementById('tabla-reservas');
            tbody.innerHTML = '';

            materiales.forEach(m => {
                const tr = document.createElement('tr');
                const disabled = m.stock <= 0 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : '';
                const btnText = m.stock <= 0 ? 'Agotado' : 'Reservar';
                const estadoColor = m.stock > 0 ? '#4CAF50' : 'var(--brand-red)';
                const estadoTexto = m.stock > 0 ? 'Disponible' : 'Sin Stock';

                tr.innerHTML = `
                    <td style="color:white; font-weight:bold;">${m.titulo}</td>
                    <td style="color:var(--text-muted)">${m.autor}</td>
                    <td><span style="color:${estadoColor}; font-weight:bold; padding: 4px 8px; background:rgba(255,255,255,0.05); border-radius:2px;">${estadoTexto}</span></td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="reservar(${m.id})" ${disabled}>${btnText}</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function reservar(id) {
            const resultado = crearReserva(id);
            const msgBox = document.getElementById('msg-box');
            
            if(resultado.success) {
                msgBox.innerHTML = `<div class="alert alert-success">✓ ${resultado.msg}</div>`;
                renderizarMateriales();
            } else {
                msgBox.innerHTML = `<div class="alert alert-error">✕ ${resultado.msg}</div>`;
            }
            setTimeout(() => msgBox.innerHTML = '', 4000);
        }

        renderizarMateriales();
    </script>
</body>
</html>
